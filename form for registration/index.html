<!DOCTYPE html>
<html lang="en">
<head>
  <title>form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
          <h1>form for registration</h1>
          <form>
            first name:<input type="text" name="first name" placeholder="enter your name"><br>
            last name :<input type="text" name="last name" placeholder="enter last name"><br>
                age   :<input type="number" name="age" placeholder="age"><br>
        date of birth :<input type="date" name="date of birth" placeholder="enter date of birth"><br>
            gender    :<input type="radio" name="gender" value="male">male
            <input type="radio"  name="gender" value="female">female<br>
             subject   :<input type="checkbox" name="subject" value="english">english
            <input type="checkbox" name="subject" value="math">math
            <input type="checkbox" name="subject" value="physics">physics<br>
            sumbit:<input type="submit" name="submit" ><br>
            </form>
</body>
</html>
